
name: 🚀 Deploy to App Store Connect

on:
  workflow_dispatch:

  push:
    tags:
      - 'release-*'

concurrency:
  group: appstore-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Rename → Compile Check → Deploy
    runs-on: macos-latest

    env:
      EXPORT_DIR:     ./build
      EXPORT_OPTIONS: ./ExportOptions.plist

      # ★★★ 换项目只改下面三行 ★★★
      TEAM_ID:        "VFQ3D59FGD"
      PROJECT_NAME:   "Uangkucatatan"
      BUNDLE_ID:      "com.uangkucatatan.app"

    steps:
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 1. Checkout
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 2. Select latest Xcode
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔧 Select Xcode (iOS 26 SDK)
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Picked: $LATEST"
          sudo xcode-select -switch "$LATEST"
          echo "Xcode $(xcodebuild -version | head -1)"
          echo "iOS SDK $(xcrun --sdk iphoneos --show-sdk-version)"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 3. Setup ASC credentials (必须在编译前)
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔑 Setup App Store Connect
        env:
          ASC_API_KEY:   ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY" > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

          cat > $EXPORT_OPTIONS << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>manageAppVersionAndBuildNumber</key>
              <false/>
          </dict>
          </plist>
          PLIST

          echo "✅ ASC credentials ready"

          echo ""
          echo "========= 🔍 Signing Identities ========="
          security find-identity -v -p codesigning || true
          echo "========================================="

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 4. 重命名项目 → 编译验证 → 失败则终止
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔄 Rename Project & Compile Check
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          echo "═════════════════════════════════════"
          echo "  🔄 重命名项目"
          echo "═════════════════════════════════════"

          OLD_NAME=$(find . -maxdepth 1 -name '*.xcodeproj' -type d | head -1 | sed 's|^\./||; s|\.xcodeproj$||')
          echo "原项目名: $OLD_NAME"
          echo "新项目名: $PROJECT_NAME"
          echo "新 Bundle: $BUNDLE_ID"

          if [ "$OLD_NAME" = "$PROJECT_NAME" ]; then
            echo "项目名未变，跳过重命名"
          else
            if [ -d "$OLD_NAME" ]; then
              mv "$OLD_NAME" "$PROJECT_NAME"
              echo "✅ 文件夹: $OLD_NAME → $PROJECT_NAME"
            fi
            mv "${OLD_NAME}.xcodeproj" "${PROJECT_NAME}.xcodeproj"
            echo "✅ xcodeproj: ${OLD_NAME}.xcodeproj → ${PROJECT_NAME}.xcodeproj"
            PBXPROJ="${PROJECT_NAME}.xcodeproj/project.pbxproj"
            sed -i '' "s/${OLD_NAME}/${PROJECT_NAME}/g" "$PBXPROJ"
            echo "✅ pbxproj 内引用全部替换"
          fi

          PBXPROJ="${PROJECT_NAME}.xcodeproj/project.pbxproj"

          OLD_BUNDLE=$(grep -m1 'PRODUCT_BUNDLE_IDENTIFIER = ' "$PBXPROJ" | sed 's/.*PRODUCT_BUNDLE_IDENTIFIER = \(.*\);/\1/')
          if [ "$OLD_BUNDLE" = "$BUNDLE_ID" ]; then
            echo "Bundle ID 未变，跳过"
          else
            sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" "$PBXPROJ"
            echo "✅ Bundle ID: $OLD_BUNDLE → $BUNDLE_ID"
          fi

          BUILD_NUMBER=${{ github.run_number }}
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" "$PBXPROJ"

          # 替换 Team ID，确保与 ASC API Key 所属 Team 一致
          sed -i '' "s/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = ${TEAM_ID};/g" "$PBXPROJ"
          echo "✅ Team ID → ${TEAM_ID}"

          # --- 从 Xcode 项目读取版本号 ---
          VERSION=$(grep -m1 'MARKETING_VERSION = ' "$PBXPROJ" | sed 's/.*MARKETING_VERSION = \(.*\);/\1/')
          echo "Version: $VERSION（来自 Xcode 项目）"

          # 写入环境变量供后续步骤使用
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          echo ""
          echo "修改后配置:"
          grep -E 'PRODUCT_BUNDLE_IDENTIFIER|PRODUCT_NAME|CURRENT_PROJECT_VERSION|MARKETING_VERSION' "$PBXPROJ" | sort -u | head -10

          echo ""
          echo "═════════════════════════════════════"
          echo "  🔨 编译验证"
          echo "═════════════════════════════════════"

          xcodebuild build \
            -scheme "$PROJECT_NAME" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

          echo ""
          echo "✅ 编译通过！继续打包上传..."

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 5. Archive
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📦 Archive
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          ARCHIVE_PATH="./build/${PROJECT_NAME}.xcarchive"

          xcodebuild archive \
            -scheme "$PROJECT_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          echo "✅ Archive done"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 6. Export IPA
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📤 Export IPA
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "./build/${PROJECT_NAME}.xcarchive" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          echo "✅ IPA exported → $(ls -lh $EXPORT_DIR/*.ipa)"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 7. Save IPA as Artifact
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 💾 Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-build${{ github.run_number }}
          path: ${{ env.EXPORT_DIR }}/*.ipa
          retention-days: 90

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 8. Upload to App Store Connect
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: ☁️ Upload to App Store Connect
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_FILE=$(ls $EXPORT_DIR/*.ipa | head -1)

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

          echo ""
          echo "══════════════════════════════════════════════"
          echo "  上传完成！去 App Store Connect 手动提审。"
          echo "  项目名: $PROJECT_NAME"
          echo "  Version: $VERSION (Build #${{ github.run_number }})"
          echo "  Bundle: $BUNDLE_ID"
          echo "══════════════════════════════════════════════"
